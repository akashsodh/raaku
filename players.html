<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPL — Players</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .players-wrap { max-width: 1000px; margin: 0 auto; padding: 24px 16px 60px; }

    /* Page hero */
    .page-hero {
      min-height: 200px; padding-top: 72px;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 32px;
      background: radial-gradient(ellipse at top, rgba(245,166,35,0.1) 0%, transparent 60%), var(--bg-dark);
      text-align: center; position: relative;
    }
    .page-hero::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .page-hero-inner { position: relative; z-index: 1; }
    .page-hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 8vw, 64px); letter-spacing: 4px;
      background: linear-gradient(135deg, #fff, var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-hero p { color: var(--text-muted); font-size: 13px; letter-spacing: 2px; margin-top: 6px; }

    /* Filter bar */
    .filter-strip {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px; align-items: center;
    }
    .filter-strip input,
    .filter-strip select {
      padding: 11px 14px;
      background: var(--bg-card); border: 1px solid var(--border-light);
      border-radius: 10px; color: var(--text);
      font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
      transition: all 0.2s; -webkit-appearance: none;
    }
    .filter-strip input { flex: 1; min-width: 180px; }
    .filter-strip input:focus,
    .filter-strip select:focus { outline: none; border-color: var(--gold); }
    .filter-strip input::placeholder { color: var(--text-dim); }
    .filter-count {
      font-size: 12px; color: var(--text-muted);
      letter-spacing: 1px; font-weight: 600; margin-left: auto;
    }
    .filter-count span { color: var(--gold); font-weight: 700; }

    /* Team pills */
    .team-pills {
      display: flex; gap: 8px; flex-wrap: nowrap;
      overflow-x: auto; margin-bottom: 16px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .team-pills::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0; padding: 7px 14px;
      border-radius: 20px; cursor: pointer;
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      border: 1.5px solid var(--border-light);
      background: var(--bg-card); color: var(--text-muted);
      transition: all 0.2s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .pill.active { background: rgba(245,166,35,0.15); border-color: var(--gold); color: var(--gold); }

    /* Players grid */
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .player-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: all 0.3s; position: relative;
    }
    .player-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: var(--shadow-gold); }

    .pc-top {
      padding: 16px; display: flex;
      align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .pc-top::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--team-color, var(--gold));
    }
    .pc-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--bg-elevated);
      border: 2px solid var(--team-color, var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; color: var(--gold);
      flex-shrink: 0; position: relative;
      overflow: hidden;
    }
    .pc-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .pc-jersey {
      position: absolute; top: -2px; right: -2px;
      width: 20px; height: 20px;
      background: var(--gold); color: var(--bg-dark);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Teko', sans-serif; font-weight: 700; font-size: 10px;
      border: 2px solid var(--bg-card);
    }
    .pc-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px; letter-spacing: 1.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .pc-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
    }
    .badge-c  { background: var(--gold); color: var(--bg-dark); font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 3px; }
    .badge-wk { background: #9B59B6; color: #fff; }

    .role-bat  { background:rgba(52,152,219,0.15); color:#3498DB; border:1px solid rgba(52,152,219,0.3); }
    .role-bowl { background:rgba(231,76,60,0.15);  color:#E74C3C; border:1px solid rgba(231,76,60,0.3); }
    .role-ar   { background:rgba(245,166,35,0.15); color:var(--gold); border:1px solid rgba(245,166,35,0.3); }
    .role-wk   { background:rgba(155,89,182,0.15); color:#9B59B6; border:1px solid rgba(155,89,182,0.3); }

    .pc-body { padding: 10px 14px 12px; }
    .pc-team {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 8px; letter-spacing: 0.5px;
    }
    .pc-team-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .pc-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; }
    .pc-stat { text-align: center; }
    .pc-stat-n { font-family:'Teko',sans-serif; font-size:18px; color:var(--gold); font-weight:600; line-height:1; }
    .pc-stat-l { font-size:9px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-top:1px; }

    /* Empty & no-result */
    .empty-box {
      grid-column: 1 / -1; text-align: center;
      padding: 50px 20px; background: var(--bg-card);
      border: 2px dashed var(--border-light); border-radius: 14px;
    }
    .empty-box .icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
    .empty-box h2 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--text-muted); margin-bottom:6px; }
    .empty-box p  { color:var(--text-dim); font-size:12px; letter-spacing:1px; }

    /* Footer */
    .footer { background:#050810; border-top:1px solid var(--border); padding:40px 0 20px; }
    .footer-container { max-width:900px; margin:0 auto; padding:0 20px; text-align:center; }
    .footer-logo { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); letter-spacing:3px; margin-bottom:8px; }
    .footer-text { color:var(--text-dim); font-size:12px; letter-spacing:1px; }

    @media (max-width: 500px) {
      .players-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 380px) {
      .players-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <div style="width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--bg-dark);">MPL</div>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;" id="navName">MPL</span>
    </a>
    <button class="nav-toggle" id="navToggle">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="teams.html">Teams</a></li>
      <li><a href="players.html" class="active">Players</a></li>
      <li><a href="fixtures.html">Fixtures</a></li>
      <li><a href="live.html">🔴 Live</a></li>
      <li><a href="standings.html">Table</a></li>
      <li><a href="stats.html">Stats</a></li>
      <li><a href="rules.html">Rules</a></li>
    </ul>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>PLAYERS</h1>
    <p id="playerSubtitle">Loading players...</p>
  </div>
</div>

<div class="players-wrap">

  <!-- Team filter pills -->
  <div class="team-pills" id="teamPills"></div>

  <!-- Search + role filter -->
  <div class="filter-strip">
    <input type="text" id="searchBox" placeholder="🔍 Search player..." />
    <select id="roleFilter">
      <option value="all">All Roles</option>
      <option value="batsman">🏏 Batsman</option>
      <option value="bowler">🎯 Bowler</option>
      <option value="allrounder">⭐ All-Rounder</option>
      <option value="wicketkeeper">🧤 Wicket-Keeper</option>
    </select>
    <div class="filter-count" id="filterCount"><span>0</span> Players</div>
  </div>

  <!-- Grid -->
  <div class="players-grid" id="playersGrid"></div>

</div>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-logo" id="footerLogo">MPL</div>
    <p class="footer-text">Mamana Premier League</p>
  </div>
</footer>

<script src="js/storage.js"></script>
<script src="js/main.js"></script>
<script>
(function () {
  'use strict';

  function xh(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var settings = MPL_STORAGE.getSettings() || {};
  var teams    = MPL_STORAGE.getTeams();
  var allPlayers = MPL_STORAGE.getPlayers();

  var leagueShort = settings.leagueShort || 'MPL';
  document.getElementById('navName').textContent    = leagueShort;
  document.getElementById('footerLogo').textContent = leagueShort;
  document.title = leagueShort + ' — Players';

  document.getElementById('playerSubtitle').textContent =
    allPlayers.length + ' registered players';

  var roleMap   = { batsman:'role-bat', bowler:'role-bowl', allrounder:'role-ar', wicketkeeper:'role-wk' };
  var roleIcon  = { batsman:'🏏', bowler:'🎯', allrounder:'⭐', wicketkeeper:'🧤' };
  var roleLabel = { batsman:'Batsman', bowler:'Bowler', allrounder:'All-Rounder', wicketkeeper:'Wicket-Keeper' };

  function getTeam(id) { return teams.find(function(t){return t.id===id;})||null; }

  var currentTeam = 'all';
  var currentRole = 'all';
  var currentSearch = '';

  /* ── Team pills ── */
  var pillsEl = document.getElementById('teamPills');
  var pillsHtml = '<div class="pill active" data-team="all">🏏 All Teams</div>';
  teams.forEach(function(t){
    pillsHtml += '<div class="pill" data-team="'+t.id+'" style="border-color:'+t.color+'55;">'+xh(t.code)+'</div>';
  });
  pillsEl.innerHTML = pillsHtml;

  pillsEl.querySelectorAll('.pill').forEach(function(pill){
    pill.addEventListener('click', function(){
      pillsEl.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active');});
      pill.classList.add('active');
      currentTeam = pill.dataset.team;
      render();
    });
  });

  /* ── Filters ── */
  document.getElementById('searchBox').addEventListener('input', function(e){
    currentSearch = e.target.value.toLowerCase();
    render();
  });
  document.getElementById('roleFilter').addEventListener('change', function(e){
    currentRole = e.target.value;
    render();
  });

  /* ── Render ── */
  function render() {
    var filtered = allPlayers;

    if (currentTeam !== 'all') {
      filtered = filtered.filter(function(p){ return p.teamId === currentTeam; });
    }
    if (currentRole !== 'all') {
      filtered = filtered.filter(function(p){ return p.role === currentRole; });
    }
    if (currentSearch) {
      filtered = filtered.filter(function(p){ return p.name.toLowerCase().includes(currentSearch); });
    }

    /* Sort by team then jersey */
    filtered.sort(function(a,b){
      if (a.teamId !== b.teamId){
        if (!a.teamId) return 1;
        if (!b.teamId) return -1;
        return a.teamId.localeCompare(b.teamId);
      }
      return (parseInt(a.jersey)||999)-(parseInt(b.jersey)||999);
    });

    var countEl = document.getElementById('filterCount');
    countEl.innerHTML = '<span>'+filtered.length+'</span> / '+allPlayers.length+' Players';

    var grid = document.getElementById('playersGrid');

    if (allPlayers.length === 0) {
      grid.innerHTML = '<div class="empty-box"><div class="icon">👥</div><h2>NO PLAYERS YET</h2><p>Admin panel mein players add karo.</p></div>';
      return;
    }
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-box"><div class="icon">🔍</div><h2>NO PLAYERS FOUND</h2><p>Filter change karke dekho.</p></div>';
      return;
    }

    grid.innerHTML = filtered.map(function(p){
      var team     = getTeam(p.teamId);
      var color    = team ? team.color : '#F5A623';
      var rClass   = roleMap[p.role]   || 'role-bat';
      var rIcon    = roleIcon[p.role]  || '🏏';
      var rLabel   = roleLabel[p.role] || 'Batsman';
      var initials = p.name.split(/\s+/).map(function(w){return w.charAt(0);}).join('').toUpperCase().substring(0,2);
      var photo    = MPL_STORAGE.getPhoto(p.id);
      var avatarIn = photo
        ? '<img src="'+photo+'" alt="'+xh(p.name)+'" />'
        : initials;

      return '<div class="player-card" style="--team-color:'+color+';">' +
        '<div class="pc-top">' +
          '<div class="pc-avatar" style="border-color:'+color+';">' +
            avatarIn +
            (p.jersey ? '<div class="pc-jersey">'+p.jersey+'</div>' : '') +
          '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div class="pc-name">' +
              xh(p.name) +
              (p.isCaptain      ? '<span class="badge-c">C</span>'  : '') +
              (p.isWicketKeeper ? '<span class="badge-c badge-wk">WK</span>' : '') +
            '</div>' +
            '<span class="pc-badge '+rClass+'">'+rIcon+' '+rLabel+'</span>' +
          '</div>' +
        '</div>' +
        '<div class="pc-body">' +
          '<div class="pc-team">' +
            (team
              ? '<div class="pc-team-dot" style="background:'+team.color+'"></div><span>'+xh(team.name)+'</span>'
              : '<span style="color:var(--warning);font-size:10px;font-weight:700;">⚠️ NO TEAM</span>'
            ) +
          '</div>' +
          '<div class="pc-stats">' +
            '<div class="pc-stat"><div class="pc-stat-n">'+(p.stats&&p.stats.batting&&p.stats.batting.runs||0)+'</div><div class="pc-stat-l">Runs</div></div>' +
            '<div class="pc-stat"><div class="pc-stat-n">'+(p.stats&&p.stats.bowling&&p.stats.bowling.wickets||0)+'</div><div class="pc-stat-l">Wkts</div></div>' +
            '<div class="pc-stat"><div class="pc-stat-n">'+(p.stats&&p.stats.batting&&p.stats.batting.matches||0)+'</div><div class="pc-stat-l">M</div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  render();
})();
</script>
</body>
</html>
