<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPL — Teams</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .teams-wrap { max-width: 1000px; margin: 0 auto; padding: 32px 16px 60px; }

    /* ── Team Cards Grid ── */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .team-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .team-card:hover { transform: translateY(-6px); border-color: var(--gold); box-shadow: var(--shadow-gold); }

    .team-banner {
      height: 130px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .team-banner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, var(--bg-card) 100%);
    }
    .team-logo {
      width: 76px; height: 76px;
      background: rgba(0,0,0,0.4);
      border: 3px solid rgba(255,255,255,0.25);
      border-radius: 50%; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; color: #fff;
      backdrop-filter: blur(8px);
      overflow: hidden;
    }
    .team-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .team-body { padding: 16px 20px 20px; }
    .team-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 2px; margin-bottom: 4px;
    }
    .team-owner {
      font-size: 12px; color: var(--text-muted);
      letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px;
    }
    .team-captain {
      font-size: 12px; color: var(--gold);
      letter-spacing: 1px; margin-bottom: 14px;
    }

    .team-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 6px; padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .ts-box { text-align: center; }
    .ts-num {
      font-family: 'Teko', sans-serif;
      font-size: 24px; color: var(--gold);
      font-weight: 600; line-height: 1;
    }
    .ts-lbl {
      font-size: 9px; color: var(--text-dim);
      letter-spacing: 1px; text-transform: uppercase; margin-top: 2px;
    }

    /* Squad section */
    .squad-toggle {
      width: 100%; padding: 10px;
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 12px;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      text-align: center;
    }
    .squad-toggle:hover { border-color: var(--gold); color: var(--gold); }

    .squad-list { display: none; margin-top: 10px; }
    .squad-list.open { display: block; }

    .squad-player {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .squad-player:last-child { border-bottom: none; }
    .sq-jersey {
      width: 28px; height: 28px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Teko', sans-serif;
      font-size: 13px; color: var(--gold); font-weight: 700;
      flex-shrink: 0;
    }
    .sq-name { flex: 1; font-weight: 600; letter-spacing: 0.5px; }
    .sq-role {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      font-weight: 700; letter-spacing: 1px;
    }
    .sq-cap { font-size: 10px; color: var(--gold); font-weight: 700; }

    /* Page hero */
    .page-hero {
      min-height: 200px; padding-top: 72px;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 32px;
      background: radial-gradient(ellipse at top, rgba(245,166,35,0.1) 0%, transparent 60%), var(--bg-dark);
      text-align: center;
      position: relative;
    }
    .page-hero::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .page-hero-inner { position: relative; z-index: 1; }
    .page-hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 4px;
      background: linear-gradient(135deg, #fff, var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-hero p { color: var(--text-muted); font-size: 13px; letter-spacing: 2px; margin-top: 6px; }

    /* Empty state */
    .empty-box {
      text-align: center; padding: 60px 20px;
      background: var(--bg-card); border: 2px dashed var(--border-light);
      border-radius: 16px;
    }
    .empty-box .icon { font-size: 56px; opacity: 0.3; margin-bottom: 14px; }
    .empty-box h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px; }
    .empty-box p { color: var(--text-dim); font-size: 13px; letter-spacing: 1px; }

    /* Role badge colors */
    .role-bat  { background:rgba(52,152,219,0.15); color:#3498DB; border:1px solid rgba(52,152,219,0.3); }
    .role-bowl { background:rgba(231,76,60,0.15);  color:#E74C3C; border:1px solid rgba(231,76,60,0.3); }
    .role-ar   { background:rgba(245,166,35,0.15); color:var(--gold); border:1px solid rgba(245,166,35,0.3); }
    .role-wk   { background:rgba(155,89,182,0.15); color:#9B59B6; border:1px solid rgba(155,89,182,0.3); }

    .footer { background:#050810; border-top:1px solid var(--border); padding:40px 0 20px; }
    .footer-container { max-width:900px; margin:0 auto; padding:0 20px; text-align:center; }
    .footer-logo { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); letter-spacing:3px; margin-bottom:8px; }
    .footer-text { color:var(--text-dim); font-size:12px; letter-spacing:1px; }

    @media (max-width: 600px) {
      .teams-grid { grid-template-columns: 1fr; }
      .team-stats { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <div style="width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--bg-dark);">MPL</div>
      <span style="font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;" id="navName">MPL</span>
    </a>
    <button class="nav-toggle" id="navToggle">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="teams.html" class="active">Teams</a></li>
      <li><a href="players.html">Players</a></li>
      <li><a href="fixtures.html">Fixtures</a></li>
      <li><a href="live.html">🔴 Live</a></li>
      <li><a href="standings.html">Table</a></li>
      <li><a href="stats.html">Stats</a></li>
      <li><a href="rules.html">Rules</a></li>
    </ul>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>THE TEAMS</h1>
    <p id="teamsSubtitle">Loading teams...</p>
  </div>
</div>

<div class="teams-wrap">
  <div class="teams-grid" id="teamsGrid"></div>
</div>

<footer class="footer">
  <div class="footer-container">
    <div class="footer-logo" id="footerLogo">MPL</div>
    <p class="footer-text">Mamana Premier League</p>
  </div>
</footer>

<script src="js/storage.js"></script>
<script src="js/main.js"></script>
<script>
(function () {
  'use strict';

  function xh(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var settings = MPL_STORAGE.getSettings() || {};
  var teams    = MPL_STORAGE.getTeams();
  var players  = MPL_STORAGE.getPlayers();
  var matches  = MPL_STORAGE.getMatches();

  var leagueShort = settings.leagueShort || 'MPL';
  document.getElementById('navName').textContent    = leagueShort;
  document.getElementById('footerLogo').textContent = leagueShort;
  document.title = leagueShort + ' — Teams';

  document.getElementById('teamsSubtitle').textContent =
    teams.length + ' teams competing this season';

  var grid = document.getElementById('teamsGrid');

  if (teams.length === 0) {
    grid.innerHTML =
      '<div class="empty-box" style="grid-column:1/-1;">' +
        '<div class="icon">🛡️</div>' +
        '<h2>NO TEAMS YET</h2>' +
        '<p>Admin panel mein teams add karo.</p>' +
      '</div>';
    return;
  }

  /* Count players + completed matches per team */
  var pCount = {};
  players.forEach(function (p) {
    if (p.teamId) pCount[p.teamId] = (pCount[p.teamId] || 0) + 1;
  });

  var roleMap = { batsman:'role-bat', bowler:'role-bowl', allrounder:'role-ar', wicketkeeper:'role-wk' };
  var roleLabel = { batsman:'BAT', bowler:'BOWL', allrounder:'AR', wicketkeeper:'WK' };

  grid.innerHTML = teams.map(function (t) {
    var photo   = MPL_STORAGE.getPhoto(t.id);
    var logoEl  = photo
      ? '<div class="team-logo"><img src="' + photo + '" alt="' + xh(t.name) + '" /></div>'
      : '<div class="team-logo">' + xh(t.code) + '</div>';

    var squad = players.filter(function (p) { return p.teamId === t.id; });
    var squadId = 'squad_' + t.id;

    var squadHtml = squad.map(function (p) {
      var roleClass = roleMap[p.role] || 'role-bat';
      var label     = roleLabel[p.role] || 'BAT';
      return '<div class="squad-player">' +
        '<div class="sq-jersey">' + (p.jersey || '#') + '</div>' +
        '<div class="sq-name">' + xh(p.name) + (p.isCaptain ? ' <span class="sq-cap">(C)</span>' : '') + (p.isWicketKeeper ? ' <span class="sq-cap" style="color:#9B59B6;">(WK)</span>' : '') + '</div>' +
        '<span class="sq-role ' + roleClass + '">' + label + '</span>' +
      '</div>';
    }).join('');

    var wins    = t.stats && t.stats.wins   ? t.stats.wins   : 0;
    var losses  = t.stats && t.stats.losses ? t.stats.losses : 0;
    var points  = t.stats && t.stats.points ? t.stats.points : 0;
    var played  = matches.filter(function (m) {
      return m.status === 'completed' && (m.teamAId === t.id || m.teamBId === t.id);
    }).length;

    return '<div class="team-card">' +
      '<div class="team-banner" style="background:linear-gradient(135deg,' + t.color + ' 0%,' + t.color + '55 100%);">' +
        logoEl +
      '</div>' +
      '<div class="team-body">' +
        '<div class="team-name">' + xh(t.name) + '</div>' +
        '<div class="team-owner">👤 ' + xh(t.owner) + '</div>' +
        (t.captain ? '<div class="team-captain">👑 Captain: ' + xh(t.captain) + '</div>' : '') +
        '<div class="team-stats">' +
          '<div class="ts-box"><div class="ts-num">' + played  + '</div><div class="ts-lbl">Played</div></div>' +
          '<div class="ts-box"><div class="ts-num">' + wins    + '</div><div class="ts-lbl">Won</div></div>' +
          '<div class="ts-box"><div class="ts-num">' + points  + '</div><div class="ts-lbl">Pts</div></div>' +
          '<div class="ts-box"><div class="ts-num">' + (pCount[t.id] || 0) + '</div><div class="ts-lbl">Players</div></div>' +
        '</div>' +
        (squad.length > 0
          ? '<button class="squad-toggle" onclick="toggleSquad(\'' + squadId + '\', this)">👥 VIEW SQUAD (' + squad.length + ')</button>' +
            '<div class="squad-list" id="' + squadId + '">' + squadHtml + '</div>'
          : '<div style="font-size:12px;color:var(--text-dim);letter-spacing:1px;text-align:center;">No squad assigned yet</div>'
        ) +
      '</div>' +
    '</div>';
  }).join('');
})();

function toggleSquad(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open')
    ? '▲ HIDE SQUAD'
    : '👥 VIEW SQUAD (' + el.children.length + ')';
}
</script>
</body>
</html>
