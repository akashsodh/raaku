<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPL Admin - Login</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo-badge">MPL</div>
      </div>

      <h1 class="login-title">ADMIN PANEL</h1>
      <p class="login-subtitle">Mamana Premier League</p>

      <div class="error-msg" id="errorMsg">Galat password!</div>

      <form id="loginForm" autocomplete="off">

        <div class="form-group">
          <label class="form-label" for="username">Your Name</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="e.g. Rahul"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="Enter admin password"
              required
            />
            <button type="button" class="password-toggle" id="togglePass" aria-label="Show password">👁️</button>
          </div>
        </div>

        <button type="submit" class="login-btn">🔐 LOGIN TO ADMIN</button>

      </form>

      <div class="login-footer">
        <a href="../index.html">← Back to Website</a>
      </div>

    </div>
  </div>

  <script src="js/sheets-api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect to dashboard if already logged in
    MPL_AUTH.redirectIfLoggedIn();

    const form       = document.getElementById('loginForm');
    const errorMsg   = document.getElementById('errorMsg');
    const passInput  = document.getElementById('password');
    const togglePass = document.getElementById('togglePass');

    // Show/hide password
    togglePass.addEventListener('click', () => {
      if (passInput.type === 'password') {
        passInput.type = 'text';
        togglePass.textContent = '🙈';
      } else {
        passInput.type = 'password';
        togglePass.textContent = '👁️';
      }
    });

    // Login submit
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = passInput.value;

      const result = MPL_AUTH.login(password, username);

      if (result.success) {
        // Success animation
        const btn = form.querySelector('.login-btn');
        btn.textContent = '✅ LOGIN SUCCESS';
        btn.style.background = 'linear-gradient(135deg, #00D26A 0%, #009E50 100%)';
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 600);
      } else {
        errorMsg.textContent = result.message;
        errorMsg.classList.add('show');
        passInput.value = '';
        passInput.focus();
        setTimeout(() => errorMsg.classList.remove('show'), 3000);
      }
    });
  </script>

</body>
</html>
