<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Study Time Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

  :root {
    --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    --card-bg: #ffffff;
    --primary: #2c3e50;
    --secondary: #3498db;
    --accent: #e74c3c;
    --success: #27ae60;
    --text: #2d3436;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg-gradient);
    color: var(--text);
    margin: 0;
    padding: 15px;
    padding-bottom: 50px;
    min-height: 100vh;
  }

  h1, h2, h3 { text-align: center; margin-top: 5px; margin-bottom: 10px; }
  
  .quote-card {
    background: var(--card-bg);
    padding: 15px 20px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    border-left: 5px solid #f1c40f;
    font-style: italic;
    color: #444;
    font-weight: 500;
    font-size: 0.95em;
    line-height: 1.4;
  }

  .dashboard {
    background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
    color: white;
    padding: 20px;
    border-radius: 16px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 10px 20px rgba(44, 62, 80, 0.3);
  }

  .dashboard p { margin: 8px 0; font-size: 1.1em; }
  .dashboard-time { font-size: 1.8em; font-weight: 700; color: #f1c40f; margin: 5px 0; }
  
  .subject-card {
    background: var(--card-bg);
    padding: 18px;
    border-radius: 16px;
    margin-bottom: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.06);
    border-left: 5px solid var(--secondary);
  }

  .subject-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  
  .subject-name { font-weight: 700; font-size: 1.05em; color: var(--primary); }
  .subject-target { font-size: 0.85em; color: #7f8c8d; font-weight: 600; background: #ecf0f1; padding: 4px 10px; border-radius: 12px; }

  .progress-container { margin-bottom: 15px; }
  .progress-info {
    display: flex; justify-content: space-between; font-size: 0.9em; font-weight: 600; margin-bottom: 5px; color: #555;
  }
  .progress-bar-bg { background: #dfe6e9; border-radius: 10px; height: 8px; width: 100%; overflow: hidden; }
  .progress-bar-fill { height: 100%; width: 0%; transition: width 0.4s ease; background: var(--success); }

  .controls {
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
  }
  
  button {
    flex: 1;
    background: #ecf0f1;
    color: var(--primary);
    border: none;
    border-radius: 8px;
    padding: 8px 0;
    font-size: 0.85em;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  button.add-btn { background: #e8f8f5; color: #1abc9c; border: 1px solid #1abc9c; }
  button.add-btn:active { background: #1abc9c; color: white; transform: scale(0.95); }
  
  button.minus-btn { flex: 0.7; background: #fdedec; color: #e74c3c; border: 1px solid #e74c3c; }
  button.minus-btn:active { background: #e74c3c; color: white; transform: scale(0.95); }

  /* History Table */
  .history-card { border-left: 5px solid #9b59b6; }
  .history-table-container { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8em; min-width: 650px; }
  th, td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #f1f2f6; }
  th { background-color: #f8f9fa; color: #57606f; font-weight: 600; position: sticky; top: 0; }
  .today-row { background-color: #eafaf1; font-weight: bold; }
  .time-badge { background: #34495e; color: white; padding: 3px 6px; border-radius: 6px; font-size: 0.9em; }

</style>
</head>
<body>

<div class="quote-card">
  <span id="daily-quote"></span>
</div>

<div class="dashboard">
  <h2 style="color: white; font-size: 1.5em; margin-top: 0;">⏱️ Daily Target Tracker</h2>
  <p>Daily Goal: <strong>14 Hours</strong></p>
  <div class="dashboard-time" id="total-time-studied">0h 0m</div>
  <p style="font-size: 0.9em; opacity: 0.9;">Total Studied Today</p>
  <div class="progress-bar-bg" style="background: rgba(255,255,255,0.3); height: 10px; margin-top: 15px;">
    <div id="overall-progress" class="progress-bar-fill" style="background: #f1c40f;"></div>
  </div>
</div>

<div id="subjects-container">
  </div>

<div class="subject-card history-card">
  <h3>📅 Last 10 Days Report</h3>
  <div class="history-table-container">
    <table id="history-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Total</th>
          <th>Raj Art</th>
          <th>Ind His</th>
          <th>Geo</th>
          <th>Sci&Tech</th>
          <th>Polity</th>
          <th>Economy</th>
          <th>Current</th>
          <th>Hindi</th>
        </tr>
      </thead>
      <tbody id="history-body">
      </tbody>
    </table>
  </div>
</div>

<script>
  // Hindi Motivational Quotes Array
  const quotes = [
    "सफलता का कोई शॉर्टकट नहीं होता, मेहनत ही एकमात्र रास्ता है।",
    "आज की गई मेहनत कल तुम्हारे सपनो की चाबी बनेगी।",
    "रुकावटें आती हैं सफलता की राहों में, यह कौन नहीं जानता, फिर भी वह मंज़िल पा ही लेता है जो हार नहीं मानता।",
    "जब तक किसी काम को किया नहीं जाता, तब तक वह असंभव ही लगता है।",
    "समय सीमित है, इसलिए इसे किसी और की ज़िंदगी जीकर व्यर्थ मत करो।",
    "लगातार हो रही असफलताओं से निराश नहीं होना चाहिए, क्योंकि कभी-कभी गुच्छे की आखिरी चाबी भी ताला खोल देती है।",
    "मंजिलें क्या हैं, रास्ता क्या है? हौसला हो तो फासला क्या है!",
    "अपने लक्ष्य को तब तक मत छोड़ो जब तक उसे पा न लो।",
    "जो पढ़ाई आज आपको दर्द लग रही है, कल यही दर्द आपकी सबसे बड़ी ताकत बनेगी।",
    "शिक्षा सबसे शक्तिशाली हथियार है जिसका उपयोग आप दुनिया को बदलने के लिए कर सकते हैं।"
  ];

  // Set Daily Quote
  const todayDateObj = new Date();
  const quoteIndex = todayDateObj.getDate() % quotes.length;
  document.getElementById('daily-quote').innerHTML = "💡 <i>\"" + quotes[quoteIndex] + "\"</i>";

  // Subjects and Target in Minutes
  const subjects = [
    { id: 'raj_art', name: 'Raj Art, Culture & Hist.', target: 120 },
    { id: 'ind_his', name: 'Indian History', target: 60 },
    { id: 'geo', name: 'Geography (Ind, Raj, World)', target: 120 },
    { id: 'sci', name: 'Science & Technology', target: 30 },
    { id: 'polity', name: 'Polity (Ind & Raj)', target: 90 },
    { id: 'eco', name: 'Economy', target: 60 },
    { id: 'current', name: 'Current Affairs', target: 120 },
    { id: 'hindi', name: 'Hindi', target: 240 }
  ];

  const totalDailyTarget = 840; // 14 hours in minutes

  // Initialize Local Storage Structure
  let trackerData = JSON.parse(localStorage.getItem("friendTimeTrackerPro")) || {};

  function getTodayDateStr() {
    const today = new Date();
    return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
  }

  function initToday() {
    const today = getTodayDateStr();
    if (!trackerData[today]) {
      trackerData[today] = {};
      subjects.forEach(sub => trackerData[today][sub.id] = 0);
      saveData();
    }
  }

  function saveData() {
    localStorage.setItem("friendTimeTrackerPro", JSON.stringify(trackerData));
  }

  function formatTime(minutes) {
    if (minutes === 0) return "0m";
    let h = Math.floor(minutes / 60);
    let m = minutes % 60;
    if (h === 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h ${m}m`;
  }

  function addTime(subjectId, minutesToAdd) {
    const today = getTodayDateStr();
    initToday();
    
    let currentMins = trackerData[today][subjectId];
    let newMins = currentMins + minutesToAdd;
    
    if (newMins < 0) newMins = 0; // Don't go below zero
    
    trackerData[today][subjectId] = newMins;
    saveData();
    render();
  }

  function render() {
    initToday();
    const today = getTodayDateStr();
    const todayData = trackerData[today];
    
    let totalStudiedToday = 0;
    const container = document.getElementById('subjects-container');
    container.innerHTML = '';

    subjects.forEach(sub => {
      let studied = todayData[sub.id] || 0;
      totalStudiedToday += studied;
      
      let percent = Math.min((studied / sub.target) * 100, 100);
      let isDone = studied >= sub.target;

      container.innerHTML += `
        <div class="subject-card" style="border-left-color: ${isDone ? '#27ae60' : '#3498db'}">
          <div class="subject-header">
            <div class="subject-name">${sub.name}</div>
            <div class="subject-target">🎯 ${formatTime(sub.target)}</div>
          </div>
          
          <div class="progress-container">
            <div class="progress-info">
              <span style="color: ${isDone ? '#27ae60' : '#e67e22'}">⏱️ Studied: ${formatTime(studied)}</span>
              <span>${Math.round(percent)}%</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width: ${percent}%; background: ${isDone ? '#27ae60' : '#3498db'};"></div>
            </div>
          </div>

          <div class="controls">
            <button class="minus-btn" onclick="addTime('${sub.id}', -10)">-10m</button>
            <button class="add-btn" onclick="addTime('${sub.id}', 10)">+10m</button>
            <button class="add-btn" onclick="addTime('${sub.id}', 15)">+15m</button>
            <button class="add-btn" onclick="addTime('${sub.id}', 30)">+30m</button>
            <button class="add-btn" onclick="addTime('${sub.id}', 60)">+1h</button>
          </div>
        </div>
      `;
    });

    // Update Dashboard
    document.getElementById('total-time-studied').innerText = formatTime(totalStudiedToday);
    let overallPercent = Math.min((totalStudiedToday / totalDailyTarget) * 100, 100);
    document.getElementById('overall-progress').style.width = `${overallPercent}%`;

    renderHistory();
  }

  function renderHistory() {
    const tbody = document.getElementById('history-body');
    tbody.innerHTML = '';
    const todayStr = getTodayDateStr();

    for (let i = 0; i < 10; i++) {
      let d = new Date();
      d.setDate(d.getDate() - i);
      let dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      
      let dayData = trackerData[dateStr];
      let isToday = (dateStr === todayStr);
      let displayDate = isToday ? "Today" : d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });

      if (dayData || isToday) {
        dayData = dayData || {};
        let dayTotal = subjects.reduce((sum, sub) => sum + (dayData[sub.id] || 0), 0);
        
        let rowHtml = `<tr class="${isToday ? 'today-row' : ''}">
          <td>${displayDate}</td>
          <td><span class="time-badge" style="background: ${dayTotal >= totalDailyTarget ? '#27ae60' : '#34495e'}">${formatTime(dayTotal)}</span></td>`;
        
        subjects.forEach(sub => {
          let mins = dayData[sub.id] || 0;
          rowHtml += `<td style="color: ${mins >= sub.target ? '#27ae60' : 'inherit'}">${formatTime(mins)}</td>`;
        });
        
        rowHtml += `</tr>`;
        tbody.innerHTML += rowHtml;
      } else {
        // No data for this past day
        tbody.innerHTML += `<tr><td>${displayDate}</td><td colspan="9" style="color: #bdc3c7;">No Record</td></tr>`;
      }
    }
  }

  // Initial Load
  render();
</script>
</body>
</html>
